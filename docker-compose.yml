services:
  db:
    image: postgres:15-alpine
    container_name: linkvote_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=votelink_user
      - POSTGRES_PASSWORD=supersecurepassword
      - POSTGRES_DB=votaciones_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - linkvote-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votelink_user -d votaciones_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: linkvote_app
    restart: always
    environment:
      - DATABASE_URL=postgres://votelink_user:supersecurepassword@db:5432/votaciones_db
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - static_data:/app/dist/public
    networks:
      - linkvote-network

  nginx:
    image: nginx:alpine
    container_name: linkvote_proxy
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - linkvote-network

networks:
  linkvote-network:
    driver: bridge

volumes:
  db_data:
  uploads_data:
  static_data:
